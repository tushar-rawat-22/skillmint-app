name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "1"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.17.0
          package-manager-cache: false

      - name: Pin npm
        run: npm install --global npm@11.13.0

      - name: Verify toolchain
        run: |
          test "$(node --version)" = "v24.17.0"
          test "$(npm --version)" = "11.13.0"

      - name: Install dependencies
        run: npm ci

      - name: Verify dependency tree
        run: npm ls --all

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run offline contract fixtures
        run: |
          set -euo pipefail
          node scripts/account-data-export-fixtures.mjs
          node scripts/active-target-fixtures.mjs
          node scripts/block-5-2-8-integration-fixtures.mjs
          node scripts/browser-data-export-contract-fixtures.mjs
          node scripts/browser-data-export-engine-fixtures.mjs
          node scripts/confirm-dialog-accessibility-fixtures.mjs
          node scripts/data-controls-fixtures.mjs
          node scripts/feedback-reliability-fixtures.mjs
          node scripts/mission-path-fixtures.mjs
          node scripts/scoring-truth-fixtures.mjs
          node scripts/trust-center-reliability-fixtures.mjs
          node scripts/analytics-contract-fixtures.mjs
          node scripts/analytics-runtime-fixtures.mjs
          node scripts/analytics-dashboard-fixtures.mjs
          node scripts/analytics-acl-fixtures.mjs
          node scripts/block6-rollout-foundation-fixtures.mjs
